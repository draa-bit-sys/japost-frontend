<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Item</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --yellow: #FFD600; --yellow-light: #FFF8CC; --yellow-dark: #C9A900;
            --blue: #1A3A6E; --blue-mid: #2255A4; --white: #FFFFFF;
            --gray: #F5F6FA; --text: #0D1B2A; --text-muted: #6B7C93; --radius: 14px;
        }
        body { font-family: 'DM Sans', sans-serif; background: var(--blue); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 48px 16px; position: relative; overflow-x: hidden; }
        body::before { content: ''; position: fixed; top: -120px; right: -120px; width: 400px; height: 400px; background: var(--yellow); border-radius: 50%; opacity: 0.12; pointer-events: none; transition: all 0.3s ease; }
        body::after { content: ''; position: fixed; bottom: -80px; left: -80px; width: 280px; height: 280px; background: var(--yellow); border-radius: 50%; opacity: 0.07; pointer-events: none; transition: all 0.3s ease; }
        
        .card { background: var(--white); border-radius: 24px; box-shadow: 0 24px 80px rgba(10,20,50,0.28); width: 100%; max-width: 560px; overflow: hidden; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.75); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 20px; transition: color 0.15s; }
        .back-link:hover { color: var(--yellow); }
        .back-link:hover svg { transform: translateX(-3px); }
        .back-link svg { transition: transform 0.15s; }
        
        .card-header { background: var(--yellow); padding: 36px 40px 28px; position: relative; }
        .card-header::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 28px; background: var(--white); border-radius: 24px 24px 0 0; }
        .badge { display: inline-block; background: var(--blue); color: var(--yellow); font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 5px 14px; border-radius: 100px; margin-bottom: 14px; }
        
        /* Font size dibikin elastis ngikutin lebar layar */
        h1 { font-family: 'Syne', sans-serif; font-size: clamp(26px, 6vw, 32px); font-weight: 800; color: var(--blue); line-height: 1.1; }
        .subtitle { margin-top: 8px; color: var(--blue-mid); font-size: 14px; opacity: 0.8; }
        
        .card-body { padding: 32px 40px 40px; }
        .field { margin-bottom: 22px; }
        .section-label { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px; }
        label { display: block; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; color: var(--blue); margin-bottom: 8px; letter-spacing: 0.02em; }
        
        input[type="text"], textarea { width: 100%; background: var(--gray); border: 2px solid transparent; border-radius: var(--radius); padding: 13px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text); outline: none; transition: border-color 0.2s, background 0.2s; }
        input[type="text"]:focus, textarea:focus { border-color: var(--yellow-dark); background: var(--yellow-light); }
        textarea { resize: vertical; min-height: 100px; }
        
        .price-wrap { position: relative; }
        .price-wrap input { padding-left: 44px; }
        .price-prefix { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--blue-mid); pointer-events: none; }
        
        .upload-zone { border: 2px dashed #C8D5E8; border-radius: var(--radius); background: var(--gray); padding: 28px 16px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
        .upload-zone:hover, .upload-zone.active { border-color: var(--yellow-dark); background: var(--yellow-light); }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .upload-icon { width: 44px; height: 44px; background: var(--yellow); border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
        .upload-label { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: var(--blue); }
        .upload-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        
        #preview-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
        .preview-item { position: relative; width: 72px; height: 72px; }
        .preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; border: 2px solid var(--yellow); display: block; }
        .delete-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: #E24B4A; border: 2px solid var(--white); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.12s; padding: 0; }
        .delete-btn:hover { background: #c0392b; transform: scale(1.15); }
        .delete-btn svg { display: block; pointer-events: none; }
        
        .divider { height: 1px; background: var(--gray); margin: 28px 0; }
        button[type="submit"] { width: 100%; background: var(--yellow); color: var(--blue); font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; letter-spacing: 0.03em; border: none; border-radius: var(--radius); padding: 16px; cursor: pointer; transition: background 0.18s, transform 0.12s, box-shadow 0.18s; box-shadow: 0 4px 20px rgba(255,214,0,0.35); }
        button[type="submit"]:hover { background: #FFE033; box-shadow: 0 6px 28px rgba(255,214,0,0.5); transform: translateY(-1px); }
        button[type="submit"]:active { transform: translateY(0); }
        button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .footer-note { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 18px; }

        /* ── JURUS SAKTI RESPONSIVE ALL DEVICES ── */
        @media (max-width: 600px) {
            body { padding: 24px 16px; } /* Kurangin padding layar biar kerasa lega */
            body::before { width: 250px; height: 250px; top: -80px; right: -80px; }
            body::after { width: 180px; height: 180px; bottom: -60px; left: -60px; }
            
            .card-header { padding: 28px 20px 20px; }
            .card-body { padding: 24px 20px 32px; }
            
            .subtitle { font-size: 13px; }
            
            .field { margin-bottom: 18px; }
            input[type="text"], textarea { padding: 12px 14px; font-size: 14px; }
            
            .upload-zone { padding: 20px 12px; }
            .preview-item { width: 60px; height: 60px; } /* Kotak preview gambar dikecilin dikit */
            
            button[type="submit"] { padding: 15px; font-size: 15px; }
        }
    </style>
</head>
<body>
    <div style="max-width:560px; width:100%; position:relative; z-index:1;">
        <a href="index.html" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            Kembali ke halaman utama
        </a>
        <div class="card">
            <div class="card-header">
                <div class="badge">Itemku Japost</div>
                <h1>Post Itemku</h1>
                <p class="subtitle">Isi formulir di bawah untuk posting item kamu</p>
            </div>
            <div class="card-body">
                <form id="postForm">

                    <p class="section-label">Info Penjual</p>

                    <div class="field">
                        <label for="namaPenjual">Nama Kamu</label>
                        <input type="text" id="namaPenjual" name="namaPenjual" placeholder="Contoh: Budi / BudiStore" required>
                    </div>
                    <div class="field">
                        <label for="kontakPenjual">Kontak (WhatsApp / Telegram)</label>
                        <input type="text" id="kontakPenjual" name="kontakPenjual" placeholder="Contoh: 08123456789" required>
                    </div>

                    <div class="divider"></div>
                    <p class="section-label">Detail Item</p>

                    <div class="field">
                        <label>Gambar Item</label>
                        <div class="upload-zone" id="dropzone">
                            <input type="file" id="gambar" accept="image/*" multiple>
                            <div class="upload-icon">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1A3A6E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="16 16 12 12 8 16"></polyline>
                                    <line x1="12" y1="12" x2="12" y2="21"></line>
                                    <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
                                </svg>
                            </div>
                            <div class="upload-label">Klik atau drag gambar ke sini</div>
                            <div class="upload-hint">PNG, JPG, WEBP — bisa lebih dari 1 gambar</div>
                        </div>
                        <div id="preview-grid"></div>
                    </div>

                    <div class="field">
                        <label for="itemName">Nama Item</label>
                        <input type="text" id="itemName" name="itemName" placeholder="Contoh: Account FF Diamond 10.000" required>
                    </div>
                    <div class="field">
                        <label for="gamecategory">Kategori Game</label>
                        <input type="text" id="gamecategory" name="gamecategory" placeholder="Contoh: Free Fire, Mobile Legends..." required>
                    </div>
                    <div class="field">
                        <label for="itemDescription">Deskripsi Item</label>
                        <textarea id="itemDescription" name="itemDescription" placeholder="Ceritain detail item kamu di sini..."></textarea>
                    </div>
                    <div class="field">
                        <label for="stok">Stok Item</label>
                        <input type="text" id="stok" name="stok" placeholder="Contoh: 10">
                    </div>
                    <div class="field">
                        <label for="value">Harga Item</label>
                        <div class="price-wrap">
                            <span class="price-prefix">Rp</span>
                            <input type="text" id="value" name="value" placeholder="50.000">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn">Post Item Sekarang</button>
                </form>
                <p class="footer-note">Item akan dikonfirmasi sebelum ditampilkan</p>
            </div>
        </div>
    </div>

    <script>
        // ── URL Railway Backend ──
        const API_URL = 'https://japost-backend-production.up.railway.app';

        const fileInput = document.getElementById('gambar');
        const grid      = document.getElementById('preview-grid');
        const zone      = document.getElementById('dropzone');
        let selectedFiles = [];

        function renderPreviews() {
            grid.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const item = document.createElement('div');
                    item.className = 'preview-item';
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.alt = file.name;
                    const btn = document.createElement('button');
                    btn.className = 'delete-btn';
                    btn.type = 'button';
                    btn.innerHTML = `<svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg>`;
                    btn.addEventListener('click', () => { selectedFiles.splice(index, 1); renderPreviews(); });
                    item.appendChild(img);
                    item.appendChild(btn);
                    grid.appendChild(item);
                };
                reader.readAsDataURL(file);
            });
        }

        fileInput.addEventListener('change', () => {
            Array.from(fileInput.files).forEach(f => {
                if (!selectedFiles.find(sf => sf.name === f.name && sf.size === f.size)) selectedFiles.push(f);
            });
            fileInput.value = '';
            renderPreviews();
        });

        zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('active'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('active'));
        zone.addEventListener('drop',      e => { e.preventDefault(); zone.classList.remove('active'); });

        document.getElementById('stok').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });
        document.getElementById('value').addEventListener('input', function() {
            let v = this.value.replace(/\D/g, '');
            this.value = v ? parseInt(v).toLocaleString('id-ID') : '';
        });

        document.getElementById('postForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.textContent = 'Mengirim...';
            btn.disabled = true;

            const fd = new FormData();
            fd.append('namaPenjual',     document.getElementById('namaPenjual').value);
            fd.append('kontakPenjual',   document.getElementById('kontakPenjual').value);
            fd.append('itemName',        document.getElementById('itemName').value);
            fd.append('gamecategory',    document.getElementById('gamecategory').value);
            fd.append('itemDescription', document.getElementById('itemDescription').value);
            fd.append('stok',            document.getElementById('stok').value || '0');
            fd.append('value',           document.getElementById('value').value || '0');
            selectedFiles.forEach(f => fd.append('gambar', f));

            try {
                const res  = await fetch(`${API_URL}/api/items`, { method: 'POST', body: fd });
                const data = await res.json();
                
                if (data.ok) {
                    const nama    = encodeURIComponent(document.getElementById('itemName').value);
                    const penjual = encodeURIComponent(document.getElementById('namaPenjual').value);
                    window.location.href = `konfirmasi.html?id=${data.id}&nama=${nama}&penjual=${penjual}`;
                } else {
                    console.error("Respon Backend Gagal:", data);
                    alert(`Gagal ngirim item ngab: ${data.message || 'Coba cek inspect element.'}`);
                    btn.textContent = 'Post Item Sekarang';
                    btn.disabled = false;
                }
            } catch(err) {
                console.error("Yahh Error Fetching cuy:", err);
                alert(`Koneksi ke backend gagal nih ngab! Coba teken F12 terus liat tab Console buat ngecek. Kemungkinan kena blokir CORS atau Railway lagi down.`);
                btn.textContent = 'Post Item Sekarang';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
